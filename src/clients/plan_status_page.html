<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>determined — planning</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f6f7f9; --fg: #1c1e21; --card: #ffffff; --muted: #667085;
    --border: #e4e7ec; --accent: #2563eb;
    --ok-bg: #ecfdf3; --ok-fg: #067647; --ok-border: #abefc6;
    --bad-bg: #fef3f2; --bad-fg: #b42318; --bad-border: #fecdca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101418; --fg: #e6e8eb; --card: #1a1f26; --muted: #98a2b3;
      --border: #2b323c; --accent: #60a5fa;
      --ok-bg: #0b2a1c; --ok-fg: #75e0a7; --ok-border: #14532d;
      --bad-bg: #2a1211; --bad-fg: #f97066; --bad-border: #7f1d1d;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 system-ui, sans-serif; background: var(--bg); color: var(--fg); }
  header {
    display: flex; justify-content: space-between; align-items: center; gap: 1rem;
    padding: 0.75rem 1.25rem; background: var(--card); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 1;
  }
  header .title { font-weight: 700; }
  header .git { color: var(--muted); font-family: ui-monospace, monospace; font-size: 0.85rem; overflow-wrap: anywhere; text-align: right; }
  header .git .branch { color: var(--accent); font-weight: 600; }
  nav#tabs {
    display: flex; gap: 0.25rem; padding: 0 1.25rem; background: var(--card);
    border-bottom: 1px solid var(--border); position: sticky; top: 3.1rem; z-index: 1;
  }
  nav#tabs button {
    appearance: none; background: none; border: none; border-bottom: 2px solid transparent;
    padding: 0.6rem 1rem; font: inherit; font-weight: 600; color: var(--muted); cursor: pointer;
  }
  nav#tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }
  nav#tabs button:hover { color: var(--fg); }
  main {
    max-width: 75rem; margin: 0 auto; padding: 1.25rem;
    display: grid; grid-template-columns: minmax(0, 1fr) 20rem; gap: 1.25rem;
    align-items: start;
  }
  @media (max-width: 50rem) { main { grid-template-columns: 1fr; } }
  #content { display: grid; gap: 1.25rem; }
  #banner { display: none; padding: 1rem 1.25rem; border-radius: 0.6rem; border: 1px solid; font-weight: 600; }
  #banner.succeeded { display: block; background: var(--ok-bg); color: var(--ok-fg); border-color: var(--ok-border); }
  #banner.failed { display: block; background: var(--bad-bg); color: var(--bad-fg); border-color: var(--bad-border); }
  #banner .timing { display: block; margin-top: 0.35rem; font-weight: 400; font-size: 0.9rem; }
  #waiting { display: none; padding: 0.6rem 1rem; border-radius: 0.6rem; background: var(--card); border: 1px dashed var(--accent); color: var(--accent); }
  #waiting.on { display: block; }
  section { background: var(--card); border: 1px solid var(--border); border-radius: 0.6rem; padding: 1rem 1.25rem; }
  section h2 { margin: 0 0 0.5rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  section.panel { display: none; }
  section.panel.active { display: block; }
  pre { margin: 0; white-space: pre-wrap; overflow-wrap: anywhere; font: 0.9rem/1.5 ui-monospace, monospace; }
  .empty { color: var(--muted); font-style: italic; }
  .doc { overflow-wrap: anywhere; }
  .doc.plain { white-space: pre-wrap; font: 0.9rem/1.5 ui-monospace, monospace; }
  .doc h1, .doc h2, .doc h3, .doc h4 { margin: 1rem 0 0.4rem; line-height: 1.3; color: var(--fg); text-transform: none; letter-spacing: normal; }
  .doc h1:first-child, .doc h2:first-child, .doc h3:first-child, .doc p:first-child { margin-top: 0; }
  .doc h1 { font-size: 1.3rem; } .doc h2 { font-size: 1.15rem; } .doc h3 { font-size: 1rem; } .doc h4 { font-size: 0.9rem; }
  .doc p { margin: 0.5rem 0; }
  .doc ul, .doc ol { margin: 0.5rem 0; padding-left: 1.5rem; }
  .doc li { margin: 0.2rem 0; }
  .doc code { font: 0.85em ui-monospace, monospace; background: var(--bg); border: 1px solid var(--border); border-radius: 0.25rem; padding: 0.05rem 0.3rem; }
  .doc pre { background: var(--bg); border: 1px solid var(--border); border-radius: 0.4rem; padding: 0.6rem 0.8rem; overflow-x: auto; }
  .doc pre code { background: none; border: none; padding: 0; }
  .doc blockquote { margin: 0.5rem 0; padding: 0.1rem 0.9rem; border-left: 3px solid var(--accent); color: var(--muted); }
  .doc hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
  .doc table { border-collapse: collapse; margin: 0.5rem 0; }
  .doc th, .doc td { border: 1px solid var(--border); padding: 0.3rem 0.6rem; }
  .tok-comment { color: var(--muted); font-style: italic; }
  .tok-string { color: var(--ok-fg); }
  .tok-keyword { color: var(--accent); font-weight: 600; }
  .tok-number { color: var(--bad-fg); }
  #steps { display: grid; gap: 0.75rem; }
  .step-card { border: 1px solid var(--border); border-radius: 0.6rem; padding: 0.75rem 1rem; background: var(--bg); }
  .step-card.done { border-color: var(--ok-border); }
  .step-card .step-head { display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem; margin-bottom: 0.35rem; }
  .step-card .step-num { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .step-card .badge { font-size: 0.75rem; font-weight: 600; padding: 0.1rem 0.5rem; border-radius: 999px; border: 1px solid; white-space: nowrap; }
  .step-card .badge.done { background: var(--ok-bg); color: var(--ok-fg); border-color: var(--ok-border); }
  .step-card .badge.pending { background: var(--card); color: var(--muted); border-color: var(--border); }
  .step-card .step-text { margin: 0; overflow-wrap: anywhere; }
  .step-card .step-text.doc p:last-child, .step-card .step-text.doc ul:last-child, .step-card .step-text.doc pre:last-child { margin-bottom: 0; }
  .step-card .done-when { margin: 0.5rem 0 0; font-size: 0.85rem; color: var(--muted); overflow-wrap: anywhere; }
  .step-card .done-when p { display: inline; margin: 0; }
  .step-card .done-when strong { color: var(--fg); }
  #log { display: grid; gap: 0.75rem; }
  .log-entry { border: 1px solid var(--border); border-radius: 0.6rem; background: var(--bg); }
  .log-entry .log-head {
    display: flex; align-items: baseline; gap: 0.5rem; padding: 0.5rem 1rem;
    border-bottom: 1px solid var(--border);
    font-family: ui-monospace, monospace; font-size: 0.85rem;
  }
  .log-entry .log-head .marker { color: var(--accent); font-weight: 700; }
  .log-entry .log-head time { color: var(--muted); }
  .log-entry .log-head .message { font-weight: 600; }
  .log-entry .log-body { padding: 0.75rem 1rem; }
  .log-entry .log-body.doc p:last-child, .log-entry .log-body.doc ul:last-child,
  .log-entry .log-body.doc pre:last-child, .log-entry .log-body.doc table:last-child { margin-bottom: 0; }
  aside#activity ol { margin: 0; padding: 0; list-style: none; max-height: 70vh; overflow-y: auto; }
  aside#activity li { padding: 0.4rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
  aside#activity li:last-child { border-bottom: none; }
  aside#activity time { display: block; color: var(--muted); font-family: ui-monospace, monospace; font-size: 0.75rem; }
  #disconnected { display: none; color: var(--bad-fg); font-size: 0.85rem; }
  #disconnected.on { display: block; }
</style>
</head>
<body>
<header>
  <div class="title">determined — planning</div>
  <div class="git"><span id="remote">…</span> · <span id="branch" class="branch">…</span></div>
</header>
<nav id="tabs">
  <button data-tab="goal" class="active">Goal</button>
  <button data-tab="plan">Plan</button>
  <button data-tab="steps">Steps</button>
  <button data-tab="log">Log</button>
</nav>
<main>
  <div id="content">
    <div id="banner"><span id="banner-text"></span><span class="timing" id="banner-timing"></span></div>
    <div id="waiting">Waiting for your input on the terminal…</div>
    <div id="disconnected">Connection lost — the determined process may have exited.</div>
    <section class="panel active" id="panel-goal"><h2>Goal</h2><div id="goal" class="doc empty">Not written yet.</div></section>
    <section class="panel" id="panel-plan"><h2>Plan</h2><div id="plan" class="doc empty">Not produced yet.</div></section>
    <section class="panel" id="panel-steps"><h2>Steps</h2><div id="steps"></div><div id="no-steps" class="empty">No steps yet.</div></section>
    <section class="panel" id="panel-log"><h2>Log</h2><div id="log"></div><div id="no-log" class="empty">No log output yet.</div></section>
  </div>
  <aside id="activity">
    <section>
      <h2>Activity</h2>
      <ol id="activity-log"></ol>
      <div id="no-activity" class="empty">No activity yet.</div>
    </section>
  </aside>
</main>
<script>
  "use strict";
  const el = (id) => document.getElementById(id);

  function fmtTime(iso) {
    return new Date(iso).toLocaleTimeString([], { hour12: false });
  }
  function fmtStamp(iso) {
    return new Date(iso).toLocaleString([], { hour12: false });
  }
  function fmtDuration(startIso, endIso) {
    let seconds = Math.max(0, Math.round((new Date(endIso) - new Date(startIso)) / 1000));
    const h = Math.floor(seconds / 3600); seconds %= 3600;
    const m = Math.floor(seconds / 60); const s = seconds % 60;
    return (h ? h + "h " : "") + (h || m ? m + "m " : "") + s + "s";
  }
  function setText(node, text, emptyText) {
    if (text) { node.textContent = text; node.classList.remove("empty"); }
    else { node.textContent = emptyText; node.classList.add("empty"); }
  }

  // Heuristic: treat text as markdown when it shows common block or inline syntax.
  function looksLikeMarkdown(text) {
    return [
      /^#{1,6}\s+\S/m,          // heading
      /^\s*[-*+]\s+\S/m,        // unordered list
      /^\s*\d+\.\s+\S/m,        // ordered list
      /^```/m,                  // fenced code
      /^>\s+\S/m,               // blockquote
      /\*\*[^*\n]+\*\*/,        // bold
      /\[[^\]\n]+\]\([^)\n]+\)/, // link
      /\|[^|\n]+\|.*\|-{3,}/s   // table (header row followed by |---| separator)
    ].some((pattern) => pattern.test(text));
  }

  function escapeHtml(text) {
    return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // Minimal syntax highlighter for fenced code blocks: comments, strings,
  // numbers, and keywords. Escapes first, then wraps tokens in spans.
  function highlightCode(code, language) {
    const keywords = "\\b(func|function|return|if|else|for|while|switch|case|default|break|continue|const|let|var|type|struct|interface|class|import|package|from|export|def|elif|try|catch|except|finally|raise|throw|new|nil|null|None|true|false|True|False|go|defer|chan|select|range|map|async|await|public|private|static|void|int|string|bool|float|double|match|impl|fn|pub|mut|use|enum)\\b";
    const rules = [
      { pattern: /(\/\/[^\n]*|#[^\n]*|\/\*[\s\S]*?\*\/)/g, cls: "tok-comment" },
      { pattern: /("(?:[^"\\\n]|\\.)*"|'(?:[^'\\\n]|\\.)*'|`[^`]*`)/g, cls: "tok-string" },
      { pattern: new RegExp(keywords, "g"), cls: "tok-keyword" },
      { pattern: /\b(\d+(?:\.\d+)?)\b/g, cls: "tok-number" },
    ];
    // Tokenize on raw text so rules never match inside emitted markup,
    // then escape each piece as it is emitted.
    let tokens = [{ text: code, cls: null }];
    for (const rule of rules) {
      const next = [];
      for (const token of tokens) {
        if (token.cls) { next.push(token); continue; }
        let last = 0;
        for (const match of token.text.matchAll(rule.pattern)) {
          if (match.index > last) next.push({ text: token.text.slice(last, match.index), cls: null });
          next.push({ text: match[0], cls: rule.cls });
          last = match.index + match[0].length;
        }
        if (last < token.text.length) next.push({ text: token.text.slice(last), cls: null });
      }
      tokens = next;
    }
    return tokens.map((token) =>
      token.cls
        ? '<span class="' + token.cls + '">' + escapeHtml(token.text) + "</span>"
        : escapeHtml(token.text)
    ).join("");
  }

  function renderInline(text) {
    let html = escapeHtml(text);
    html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
    html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    html = html.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
    html = html.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    return html;
  }

  // Split one table row into trimmed cell strings, dropping the outer pipes.
  function splitRow(line) {
    return line.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map((cell) => cell.trim());
  }
  function isTableRow(line) {
    return /^\s*\|.*\|\s*$/.test(line);
  }
  function isSeparatorRow(line) {
    return isTableRow(line) && splitRow(line).every((cell) => /^:?-{3,}:?$/.test(cell));
  }
  function renderTable(rows) {
    const header = splitRow(rows[0]);
    const body = rows.slice(2).map(splitRow);
    const head = "<tr>" + header.map((cell) => "<th>" + renderInline(cell) + "</th>").join("") + "</tr>";
    const rowsHtml = body.map((cells) =>
      "<tr>" + cells.map((cell) => "<td>" + renderInline(cell) + "</td>").join("") + "</tr>"
    ).join("");
    return "<table><thead>" + head + "</thead><tbody>" + rowsHtml + "</tbody></table>";
  }
  // Some sources flatten a markdown table onto one line, joining rows with a
  // space ("| a | b | |---|---| | 1 | 2 |"). Re-split "| |" boundaries into
  // newlines so the block parser sees one row per line.
  function unflattenTables(text) {
    let inFence = false;
    return text.split("\n").map((line) => {
      if (line.startsWith("```")) { inFence = !inFence; return line; }
      if (inFence || !/\|\s*\|\s*:?-{3,}/.test(line)) return line;
      return line.replace(/\|\s+\|/g, "|\n|");
    }).join("\n");
  }

  function markdownToHtml(text) {
    const lines = unflattenTables(text).split("\n");
    const out = [];
    let index = 0;
    while (index < lines.length) {
      const line = lines[index];
      if (line.startsWith("```")) {
        const language = line.slice(3).trim().toLowerCase();
        const code = [];
        index++;
        while (index < lines.length && !lines[index].startsWith("```")) code.push(lines[index++]);
        index++; // closing fence
        out.push("<pre><code>" + highlightCode(code.join("\n"), language) + "</code></pre>");
      } else if (/^#{1,6}\s+/.test(line)) {
        const level = line.match(/^#+/)[0].length;
        out.push("<h" + level + ">" + renderInline(line.replace(/^#+\s+/, "")) + "</h" + level + ">");
        index++;
      } else if (/^\s*([-*+]|\d+\.)\s+/.test(line)) {
        const ordered = /^\s*\d+\./.test(line);
        const tag = ordered ? "ol" : "ul";
        const items = [];
        while (index < lines.length && /^\s*([-*+]|\d+\.)\s+/.test(lines[index])) {
          items.push("<li>" + renderInline(lines[index].replace(/^\s*([-*+]|\d+\.)\s+/, "")) + "</li>");
          index++;
        }
        out.push("<" + tag + ">" + items.join("") + "</" + tag + ">");
      } else if (/^>\s?/.test(line)) {
        const quoted = [];
        while (index < lines.length && /^>\s?/.test(lines[index])) {
          quoted.push(lines[index].replace(/^>\s?/, ""));
          index++;
        }
        out.push("<blockquote>" + markdownToHtml(quoted.join("\n")) + "</blockquote>");
      } else if (isTableRow(line) && index + 1 < lines.length && isSeparatorRow(lines[index + 1])) {
        const rows = [];
        while (index < lines.length && isTableRow(lines[index])) rows.push(lines[index++]);
        out.push(renderTable(rows));
      } else if (/^\s*(---+|\*\*\*+)\s*$/.test(line)) {
        out.push("<hr>");
        index++;
      } else if (line.trim() === "") {
        index++;
      } else {
        const paragraph = [];
        while (index < lines.length && lines[index].trim() !== "" &&
               !/^(#{1,6}\s|```|>\s?|\s*([-*+]|\d+\.)\s)/.test(lines[index]) &&
               !(isTableRow(lines[index]) && index + 1 < lines.length && isSeparatorRow(lines[index + 1]))) {
          paragraph.push(lines[index]);
          index++;
        }
        out.push("<p>" + renderInline(paragraph.join(" ")) + "</p>");
      }
    }
    return out.join("");
  }

  function setDoc(node, text, emptyText) {
    node.classList.remove("empty", "plain");
    if (!text) {
      node.textContent = emptyText;
      node.classList.add("empty");
    } else if (looksLikeMarkdown(text)) {
      node.innerHTML = markdownToHtml(text);
    } else {
      node.textContent = text;
      node.classList.add("plain");
    }
  }

  function selectTab(name) {
    for (const button of document.querySelectorAll("#tabs button")) {
      button.classList.toggle("active", button.dataset.tab === name);
    }
    for (const panel of document.querySelectorAll("#content section.panel")) {
      panel.classList.toggle("active", panel.id === "panel-" + name);
    }
  }
  for (const button of document.querySelectorAll("#tabs button")) {
    button.addEventListener("click", () => {
      history.pushState(null, "", "/" + button.dataset.tab);
      selectTab(button.dataset.tab);
    });
  }

  function tabFromPath() {
    const name = window.location.pathname.replace(/^\//, "");
    return ["goal", "plan", "steps", "log"].includes(name) ? name : "goal";
  }
  window.addEventListener("popstate", () => selectTab(tabFromPath()));
  selectTab(tabFromPath());

  function render(status) {
    setText(el("remote"), status.git.remote, "no remote");
    setText(el("branch"), status.git.branch, "no branch");
    setDoc(el("goal"), status.goal, "Not written yet.");
    setDoc(el("plan"), status.plan, "Not produced yet.");
    el("waiting").classList.toggle("on", !!status.waitingForInput);

    renderSteps(status.taskSteps || []);
    renderLog(status.log || []);
    renderActivity(status.steps || []);
    renderBanner(status);
  }

  function renderLog(entries) {
    const list = el("log");
    const logTabActive = el("panel-log").classList.contains("active");
    const stickToBottom = logTabActive &&
      window.innerHeight + window.scrollY >= document.body.scrollHeight - 40;
    list.replaceChildren();
    for (const entry of entries) {
      const article = document.createElement("article");
      article.className = "log-entry";

      const head = document.createElement("div");
      head.className = "log-head";
      const marker = document.createElement("span");
      marker.className = "marker";
      marker.textContent = "==>";
      const t = document.createElement("time");
      t.textContent = fmtTime(entry.at);
      const message = document.createElement("span");
      message.className = "message";
      message.textContent = entry.message;
      head.append(marker, t, message);
      article.append(head);

      if (entry.body) {
        const body = document.createElement("div");
        body.className = "log-body doc";
        if (looksLikeMarkdown(entry.body)) body.innerHTML = markdownToHtml(entry.body);
        else { body.textContent = entry.body; body.classList.add("plain"); }
        article.append(body);
      }
      list.append(article);
    }
    el("no-log").style.display = entries.length ? "none" : "block";
    if (stickToBottom) window.scrollTo(0, document.body.scrollHeight);
  }

  function renderSteps(steps) {
    const list = el("steps");
    list.replaceChildren();
    steps.forEach((step, index) => {
      const card = document.createElement("article");
      card.className = "step-card" + (step.completed ? " done" : "");

      const head = document.createElement("div");
      head.className = "step-head";
      const num = document.createElement("span");
      num.className = "step-num";
      num.textContent = "Step " + (index + 1);
      const badge = document.createElement("span");
      badge.className = "badge " + (step.completed ? "done" : "pending");
      badge.textContent = step.completed ? "✓ Done" : "Pending";
      head.append(num, badge);

      const text = document.createElement("div");
      text.className = "step-text doc";
      if (looksLikeMarkdown(step.text)) text.innerHTML = markdownToHtml(step.text);
      else { text.textContent = step.text; text.classList.add("plain"); }
      card.append(head, text);

      if (step.doneWhen) {
        const doneWhen = document.createElement("div");
        doneWhen.className = "done-when doc";
        const label = document.createElement("strong");
        label.textContent = "Done when: ";
        if (looksLikeMarkdown(step.doneWhen)) {
          const body = document.createElement("span");
          body.innerHTML = markdownToHtml(step.doneWhen);
          doneWhen.append(label, body);
        } else {
          doneWhen.append(label, step.doneWhen);
        }
        card.append(doneWhen);
      }
      list.append(card);
    });
    el("no-steps").style.display = steps.length ? "none" : "block";
  }

  function renderActivity(steps) {
    const list = el("activity-log");
    list.replaceChildren();
    for (const step of steps) {
      const li = document.createElement("li");
      const t = document.createElement("time");
      t.textContent = fmtTime(step.at);
      li.append(t, step.message);
      list.append(li);
    }
    el("no-activity").style.display = steps.length ? "none" : "block";
    list.scrollTop = list.scrollHeight;
  }

  function renderBanner(status) {
    const banner = el("banner");
    banner.classList.remove("succeeded", "failed");
    if (status.phase !== "succeeded" && status.phase !== "failed") return;
    banner.classList.add(status.phase);
    el("banner-text").textContent = status.phase === "succeeded"
      ? "✓ Planning has completed"
      : "✗ Planning ended without a completed plan";
    el("banner-timing").textContent =
      "Started " + fmtStamp(status.startedAt) +
      " · Ended " + fmtStamp(status.endedAt) +
      " · Duration " + fmtDuration(status.startedAt, status.endedAt);
  }

  const events = new EventSource("/events");
  events.onmessage = (event) => {
    el("disconnected").classList.remove("on");
    render(JSON.parse(event.data));
  };
  events.onerror = () => el("disconnected").classList.add("on");
</script>
</body>
</html>
